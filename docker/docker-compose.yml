version: "3.9"

# ── Global log rotation ─────────────────────────────────────────────────────
# Prevents disk exhaustion on edge devices (NUCs, district hospital servers).
# Each container retains at most 150MB of logs (3 x 50MB rotated files).
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "3"

# ── Shared network ────────────────────────────────────────────────────────────
networks:
  sepsis_net:
    driver: bridge

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB:       sepsis_vitals
      POSTGRES_USER:     sepsis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "5432:5432"
    networks: [sepsis_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sepsis -d sepsis_vitals"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (refresh token store + rate-limit counters) ──────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks: [sepsis_net]
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API server ─────────────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      db:    { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      DATABASE_URL:         postgresql+asyncpg://sepsis:${POSTGRES_PASSWORD}@db:5432/sepsis_vitals
      REDIS_URL:            redis://:${REDIS_PASSWORD}@redis:6379/0
      ANTHROPIC_API_KEY:    ${ANTHROPIC_API_KEY:?Set ANTHROPIC_API_KEY in .env}
      JWT_PRIVATE_KEY:      ${JWT_PRIVATE_KEY:?Set JWT_PRIVATE_KEY in .env}
      JWT_PUBLIC_KEY:       ${JWT_PUBLIC_KEY:?Set JWT_PUBLIC_KEY in .env}
      SEPSIS_PII_KEY:       ${SEPSIS_PII_KEY:?Set SEPSIS_PII_KEY in .env}
      SEPSIS_WEBHOOK_SECRET:${SEPSIS_WEBHOOK_SECRET:?Set SEPSIS_WEBHOOK_SECRET in .env}
      SEPSIS_CONFIG_KEY:    ${SEPSIS_CONFIG_KEY}
      SEPSIS_ENV:           ${SEPSIS_ENV:-production}
      SEPSIS_ALLOWED_ORIGINS: http://localhost:8000,http://localhost:3000
      MLLP_TLS_CERT:        ${MLLP_TLS_CERT:-}
      MLLP_TLS_KEY:         ${MLLP_TLS_KEY:-}
      MLLP_TLS_CA:          ${MLLP_TLS_CA:-}
      BREAK_GLASS_TOKEN_HASH: ${BREAK_GLASS_TOKEN_HASH:-}
      LOG_LEVEL:            INFO
    ports:
      - "8080:8080"
      - "2575:2575"
    networks: [sepsis_net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    networks: [sepsis_net]

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    restart: unless-stopped
    logging: *default-logging
    depends_on: [prometheus]
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?Set GRAFANA_PASSWORD in .env}
      GF_USERS_ALLOW_SIGN_UP:     false
      GF_SERVER_ROOT_URL:         http://localhost:3001
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    networks: [sepsis_net]

  # ── PostgreSQL Backup (nightly encrypted pg_dump) ───────────────────────────
  # Produces encrypted, timestamped backups of the clinical database.
  # Local retention: 7 days.  Set BACKUP_S3_BUCKET for offsite replication.
  db-backup:
    image: prodrigestivill/postgres-backup-local:16-alpine
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      db: { condition: service_healthy }
    environment:
      POSTGRES_HOST:     db
      POSTGRES_DB:       sepsis_vitals
      POSTGRES_USER:     sepsis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_EXTRA_OPTS: "--no-owner --clean --if-exists"
      SCHEDULE:          "@daily"
      BACKUP_KEEP_DAYS:  7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      HEALTHCHECK_PORT:  8088
    volumes:
      - ./backups:/backups
    networks: [sepsis_net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/"]
      interval: 60s
      timeout: 5s
      retries: 3

  # ── Offsite Backup Sync (3-2-1 rule) ──────────────────────────────────────
  # Syncs encrypted backups to S3 whenever internet is available.
  # Protects against physical device loss, theft, or fire.
  # Only starts if BACKUP_S3_BUCKET is set in .env.
  backup-offsite:
    image: amazon/aws-cli:2.15.40
    restart: unless-stopped
    logging: *default-logging
    depends_on: [db-backup]
    entrypoint: /bin/sh
    command:
      - -c
      - |
        if [ -z "$$BACKUP_S3_BUCKET" ]; then
          echo "BACKUP_S3_BUCKET not set — offsite sync disabled (local-only backups)"
          sleep infinity
        fi
        echo "Offsite backup sync active: s3://$$BACKUP_S3_BUCKET"
        while true; do
          echo "[$(date -Iseconds)] Starting S3 sync..."
          aws s3 sync /backups "s3://$$BACKUP_S3_BUCKET/sepsis-vitals/" \
            --storage-class STANDARD_IA \
            --exclude "*.tmp" \
            --only-show-errors \
          && echo "[$(date -Iseconds)] S3 sync complete" \
          || echo "[$(date -Iseconds)] S3 sync failed (will retry next cycle)"
          sleep 21600
        done
    environment:
      AWS_ACCESS_KEY_ID:     ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION:    ${AWS_DEFAULT_REGION:-us-east-1}
      BACKUP_S3_BUCKET:      ${BACKUP_S3_BUCKET:-}
    volumes:
      - ./backups:/backups:ro
    networks: [sepsis_net]

  # ── Dashboard (React frontend via nginx) ────────────────────────────────────
  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      api: { condition: service_healthy }
    ports:
      - "8000:80"
    networks: [sepsis_net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
