version: "3.9"

# ── Shared network ────────────────────────────────────────────────────────────
networks:
  sepsis_net:
    driver: bridge

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       sepsis_vitals
      POSTGRES_USER:     sepsis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "5432:5432"
    networks: [sepsis_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sepsis -d sepsis_vitals"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (refresh token store + rate-limit counters) ──────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks: [sepsis_net]
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API server ─────────────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    depends_on:
      db:    { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      DATABASE_URL:         postgresql+asyncpg://sepsis:${POSTGRES_PASSWORD}@db:5432/sepsis_vitals
      REDIS_URL:            redis://:${REDIS_PASSWORD}@redis:6379/0
      ANTHROPIC_API_KEY:    ${ANTHROPIC_API_KEY:?Set ANTHROPIC_API_KEY in .env}
      JWT_PRIVATE_KEY:      ${JWT_PRIVATE_KEY:?Set JWT_PRIVATE_KEY in .env}
      JWT_PUBLIC_KEY:       ${JWT_PUBLIC_KEY:?Set JWT_PUBLIC_KEY in .env}
      SEPSIS_PII_KEY:       ${SEPSIS_PII_KEY:?Set SEPSIS_PII_KEY in .env}
      SEPSIS_WEBHOOK_SECRET:${SEPSIS_WEBHOOK_SECRET:?Set SEPSIS_WEBHOOK_SECRET in .env}
      SEPSIS_CONFIG_KEY:    ${SEPSIS_CONFIG_KEY}
      SEPSIS_ENV:           ${SEPSIS_ENV:-production}
      SEPSIS_ALLOWED_ORIGINS: http://localhost:8000,http://localhost:3000
      MLLP_TLS_CERT:        ${MLLP_TLS_CERT:-}
      MLLP_TLS_KEY:         ${MLLP_TLS_KEY:-}
      MLLP_TLS_CA:          ${MLLP_TLS_CA:-}
      LOG_LEVEL:            INFO
    ports:
      - "8080:8080"
      - "2575:2575"
    networks: [sepsis_net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    restart: unless-stopped
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    networks: [sepsis_net]

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    restart: unless-stopped
    depends_on: [prometheus]
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?Set GRAFANA_PASSWORD in .env}
      GF_USERS_ALLOW_SIGN_UP:     false
      GF_SERVER_ROOT_URL:         http://localhost:3001
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    networks: [sepsis_net]

  # ── PostgreSQL Backup (nightly encrypted pg_dump) ───────────────────────────
  # Produces encrypted, timestamped backups of the clinical database.
  # Local retention: 7 days.  Set BACKUP_S3_BUCKET for offsite replication.
  db-backup:
    image: prodrigestivill/postgres-backup-local:16-alpine
    restart: unless-stopped
    depends_on:
      db: { condition: service_healthy }
    environment:
      POSTGRES_HOST:     db
      POSTGRES_DB:       sepsis_vitals
      POSTGRES_USER:     sepsis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_EXTRA_OPTS: "--no-owner --clean --if-exists"
      SCHEDULE:          "@daily"
      BACKUP_KEEP_DAYS:  7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      HEALTHCHECK_PORT:  8088
      # GPG encryption — set BACKUP_GPG_PUBLIC_KEY in .env for encrypted backups
      # ENCRYPTION_GPG_PUBLIC_KEY: ${BACKUP_GPG_PUBLIC_KEY:-}
    volumes:
      - ./backups:/backups
    networks: [sepsis_net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/"]
      interval: 60s
      timeout: 5s
      retries: 3

  # ── Dashboard (React frontend via nginx) ────────────────────────────────────
  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    restart: unless-stopped
    depends_on:
      api: { condition: service_healthy }
    ports:
      - "8000:80"
    networks: [sepsis_net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
